    window.storage = {
      get: function (k) { try { var v = localStorage.getItem('kp_' + k); return Promise.resolve(v == null ? null : { key: k, value: v }); } catch (e) { return Promise.resolve(null); } },
      set: function (k, v) { try { localStorage.setItem('kp_' + k, v); } catch (e) {} return Promise.resolve({ key: k, value: v }); },
      delete: function (k) { try { localStorage.removeItem('kp_' + k); } catch (e) {} return Promise.resolve({ key: k, deleted: true }); },
      list: function () { try { var ks = []; for (var i = 0; i < localStorage.length; i++) { var key = localStorage.key(i); if (key && key.indexOf('kp_') === 0) ks.push(key.slice(3)); } return Promise.resolve({ keys: ks }); } catch (e) { return Promise.resolve({ keys: [] }); } }
    };
  }

// Snap an OCR'd hero name to the known roster for its troop (fixes mis-reads /
// stray capitalization). Keeps the original only if nothing is reasonably close.
const _lev = (a, b) => {
  const m = a.length,
    n = b.length;
  const d = Array.from({
    length: m + 1
  }, (_, i) => [i, ...Array(n).fill(0)]);
  for (let j = 0; j <= n; j++) d[0][j] = j;
  for (let i = 1; i <= m; i++) for (let j = 1; j <= n; j++) d[i][j] = Math.min(d[i - 1][j] + 1, d[i][j - 1] + 1, d[i - 1][j - 1] + (a[i - 1] === b[j - 1] ? 0 : 1));
  return d[m][n];
};
const normalizeHeroName = (name, troop) => {
  const list = HEROES_BY_TROOP[troop] || [];
  if (!name) return null;
  const lc = String(name).trim().toLowerCase();
  const exact = list.find(h => h.toLowerCase() === lc);
  if (exact) return exact;
  let best = null,
    bestD = Infinity;
  for (const h of list) {
    const dd = _lev(lc, h.toLowerCase());
    if (dd < bestD) {
      bestD = dd;
      best = h;
    }
  }
  if (best && bestD <= Math.max(2, Math.floor(best.length / 2))) return best; // close enough → snap
  return String(name).trim(); // otherwise keep what was read
};

const minRarityForLevel = level => {
  if (level > 80) return 'mythic';
  if (level > 60) return 'purple';
  if (level > 40) return 'blue';
  if (level > 20) return 'green';
  return 'grey';
};
// Correct impossible OCR rarities using hard game rules:
//  • a piece can't be a rarity whose level cap is below its enhancement level
//  • Red is ascended from Mythic (needs & preserves Mastery 10), so mastery < 10 can't be Red
const sanitizeRarity = (rarity, level, mastery) => {
  let r = rarity;
  const floor = minRarityForLevel(level || 0);
  if (RARITY_RANK[r] < RARITY_RANK[floor]) r = floor;
  if (r === 'red' && (mastery || 0) < 10) r = 'mythic';
  return r;
};

// Sum: banked XP + (count × tier value) for each XP Part type
const totalXp = r => {
  if (!r) return 0;
  let t = r.xpBanked || 0;
  if (r.xpParts) {
    XP_TIERS.forEach(tier => {
      t += tier * (r.xpParts[String(tier)] || 0);
    });
  }
  // Backward compat: legacy `xp` field (single number)
  if (r.xp != null && r.xpBanked == null) t += r.xp;
  return t;
};

// Deduct XP from resources: use banked first, then convert parts (largest first).
// Any over-conversion goes back to banked. Returns the mutated resources object.
const spendXp = (r, amount) => {
  if (!r || amount <= 0) return r;
  if ((r.xpBanked || 0) >= amount) {
    r.xpBanked -= amount;
    return r;
  }
  let deficit = amount - (r.xpBanked || 0);
  r.xpBanked = 0;
  // Use parts largest first to cover deficit
  for (const tier of [...XP_TIERS].sort((a, b) => b - a)) {
    if (deficit <= 0) break;
    const have = r.xpParts?.[String(tier)] || 0;
    if (have === 0) continue;
    const needCount = Math.ceil(deficit / tier);
    const useCount = Math.min(have, needCount);
    r.xpParts[String(tier)] = have - useCount;
    const xpFromParts = useCount * tier;
    if (xpFromParts > deficit) {
      r.xpBanked += xpFromParts - deficit;
      deficit = 0;
    } else {
      deficit -= xpFromParts;
    }
  }
  return r;
};

// Check if a piece meets a target. Higher rarity always counts as "complete"
// for that target. Same rarity → check level. Different rarity → check the
// rarity rank.
const meetsTarget = (piece, target) => {
  if (!piece) return false;
  if (target.type === 'level') {
    const pieceR = RARITY_RANK[piece.rarity];
    const targetR = RARITY_RANK[target.rarity];
    if (pieceR > targetR) return true; // higher rarity = already past this
    if (pieceR < targetR) return false; // lower rarity = not done
    return piece.level >= target.level;
  }
  if (target.type === 'ascend') {
    // Ascended means rarity > mythic (i.e., Red)
    return RARITY_RANK[piece.rarity] >= RARITY_RANK.red;
  }
  return false;
};

// Identify the current phase = the first phase with incomplete actions
const identifyCurrentPhase = (gear, path = SHAKES_PATH) => {
  for (const phase of path) {
    if (phase.isStop || phase.isChoose) return phase;
    const allDone = phase.actions.every(a => {
      const piece = gear[`${a.troop}-${a.slot}`];
      return meetsTarget(piece, a);
    });
    if (!allDone) return phase;
  }
  return path[path.length - 1];
};

// Overall + per-phase completion, counting every individual gear goal as one step.
const pathProgress = (gear, path = SHAKES_PATH) => {
  const phases = path.filter(p => p.actions && p.actions.length);
  let total = 0,
    done = 0;
  const per = {};
  phases.forEach(p => {
    let pd = 0;
    p.actions.forEach(a => {
      total++;
      if (meetsTarget(gear[`${a.troop}-${a.slot}`], a)) {
        done++;
        pd++;
      }
    });
    per[p.phase] = {
      done: pd,
      total: p.actions.length,
      pct: p.actions.length ? Math.round(pd / p.actions.length * 100) : 0
    };
  });
  return {
    total,
    done,
    pct: total ? Math.round(done / total * 100) : 0,
    per
  };
};

// For a single action, what's the user's progress?
// Returns: { done: bool, piece, action, gap: { type, fromLevel, toLevel, ... } }
const analyzeAction = (action, gear) => {
  const piece = gear[`${action.troop}-${action.slot}`];
  const done = meetsTarget(piece, action);
  if (done) return {
    done: true,
    action,
    piece
  };
  if (!piece) {
    return {
      done: false,
      action,
      piece: null,
      gap: {
        reason: 'No gear in this slot'
      }

  if (action.type === 'level') {

      // Rarity too low — need to push to L100 of current rarity, ascend, ...
      return {
        done: false,
        action,
        piece,
        gap: {
          reason: `Needs to be ${RARITY_LABEL[action.rarity]} rarity (currently ${RARITY_LABEL[piece.rarity]})`,

          fromRarity: piece.rarity,
          toRarity: action.rarity,
          fromLevel: piece.level,
          fromMastery: piece.mastery
        }
      };
    }

    const xpCost = xpToReach(piece.rarity, piece.level, action.level);
    const mithrilCost = piece.rarity === 'red' ? mithrilToReach(piece.level, action.level) : 0;
    const mgCost = piece.rarity === 'red' ? redMgToReach(piece.level, action.level) : 0;
    return {
      done: false,
      action,
      piece,
      gap: {
        reason: `Push from L${piece.level} to L${action.level}`,
        fromLevel: piece.level,
        toLevel: action.level,
        xpCost,
        mithrilCost,
        mgCost
      }
    };
  }
  if (action.type === 'ascend') {
    // Need: Mythic L100 + Mastery 10 + 2 MG
    const ascendReady = piece.rarity === 'mythic' && piece.level === 100 && (piece.mastery || 0) >= MASTERY_FOR_ASCEND;
    if (RARITY_RANK[piece.rarity] >= RARITY_RANK.red) {
      return {
        done: true,
        action,
        piece
      };
    }
    const xpStillNeeded = piece.rarity === 'mythic' ? xpToReach('mythic', piece.level, 100) : null;
    const hammersStillNeeded = piece.rarity === 'mythic' ? hammersToReach(piece.mastery || 0, MASTERY_FOR_ASCEND) : null;
    return {
      done: false,
      action,
      piece,
      gap: {
        reason: ascendReady ? 'Ready to ascend!' : 'Not ready for ascension yet',
        ascendReady,
        needsXp: xpStillNeeded,
        needsHammers: hammersStillNeeded,
        needsMythicGears: MG_FOR_ASCEND,
        currentRarity: piece.rarity,
        currentLevel: piece.level,
        currentMastery: piece.mastery || 0

    };
  }
  return {
    done: false,
    action,
    piece
  };
};

// For the CURRENT phase, compute next-step recommendations.
// Sorts actions by what's most affordable / closest to completion.
const computeNextActions = (gear, resources, path = SHAKES_PATH) => {
  const phase = identifyCurrentPhase(gear, path);
  if (phase.isStop || phase.isChoose) return {
    phase,
    actions: [],
    total: {
      xp: 0,
      hammers: 0,
      mg: 0,
      mithril: 0
    }
  };
  const analyzed = phase.actions.map(a => analyzeAction(a, gear));
  // Hide "push to Red" actions for pieces that aren't ascended yet — the ascend
  // card for that piece is what's actionable; the level appears once it's Red.
  const remaining = analyzed.filter(x => !x.done && !(x.action.type === 'level' && x.gap && x.gap.needsAscension));

  // Sort: ready-to-ascend > affordable upgrades > big climbs
  remaining.sort((a, b) => {
    const aReady = a.gap?.ascendReady ? 0 : 1;
    const bReady = b.gap?.ascendReady ? 0 : 1;
    if (aReady !== bReady) return aReady - bReady;
    const aCost = (a.gap?.xpCost ?? 0) + (a.gap?.needsXp ?? 0);
    const bCost = (b.gap?.xpCost ?? 0) + (b.gap?.needsXp ?? 0);
    return aCost - bCost;
  });

  // Compute total cost of all remaining actions
  let totalXp = 0,
    totalHammers = 0,
    totalMg = 0,
    totalMithril = 0;
  remaining.forEach(r => {
    if (r.gap?.xpCost) totalXp += r.gap.xpCost;
    if (r.gap?.needsXp) totalXp += r.gap.needsXp;
    if (r.gap?.needsHammers) totalHammers += r.gap.needsHammers;
    if (r.gap?.needsMythicGears) totalMg += r.gap.needsMythicGears;
    if (r.gap?.mgCost) totalMg += r.gap.mgCost;
    if (r.gap?.mithrilCost) totalMithril += r.gap.mithrilCost;
  });
  return {
    phase,
    actions: remaining,
    completed: analyzed.filter(x => x.done),
    total: {
      xp: totalXp,
      hammers: totalHammers,
      mg: totalMg,
      mithril: totalMithril
    }
  };
};

const extractJson = text => {

  if (start === -1) return null;

    inString = false,
    escape = false,
    end = -1;
  for (let i = start; i < s.length; i++) {
    const ch = s[i];
    if (escape) {
      escape = false;
      continue;
    }
    if (inString) {
      if (ch === '\\') escape = true;else if (ch === '"') inString = false;
    } else {
      if (ch === '"') inString = true;else if (ch === '{') depth++;else if (ch === '}') {
        depth--;
        if (depth === 0) {
          end = i;
          break;
        }
      }
    }
  }
  if (end === -1) return null;
  return s.slice(start, end + 1);
};

// Migrate older state shapes to current
const migrateState = s => {
  if (!s) return defaultState();
  s.resources = s.resources || {};
  // Old `xp` flat field → xpBanked
  if (s.resources.xp != null && s.resources.xpBanked == null) {
    s.resources.xpBanked = s.resources.xp;
    delete s.resources.xp;
  }
  if (s.resources.xpBanked == null) s.resources.xpBanked = 0;
  // Ensure xpParts exists with all tiers
  s.resources.xpParts = s.resources.xpParts || {};

    if (s.resources.xpParts[String(t)] == null) s.resources.xpParts[String(t)] = 0;
  });
  if (s.resources.hammers == null) s.resources.hammers = 0;
  if (s.resources.mithril == null) s.resources.mithril = 0;
  if (s.resources.mythicGears == null) s.resources.mythicGears = 0;
  // Ensure heroImages map exists
  if (!s.heroImages) s.heroImages = {};
  if (s.specialization === undefined) s.specialization = null;
  if (s.playerName === undefined) s.playerName = '';
  if (s.shareAlliance === undefined) s.shareAlliance = false;
  if (s.gateSeen === undefined) s.gateSeen = false;
  if (s.helpRequested === undefined) s.helpRequested = false;
  if (s.helpRequestedAt === undefined) s.helpRequestedAt = null;
  if (!s.playerId) s.playerId = 'p_' + Math.random().toString(36).slice(2, 11);
  if (s.weekSnap === undefined) s.weekSnap = null;
  if (!s.allianceCode) s.allianceCode = DEFAULT_ALLIANCE_CODE;
  if (s.allianceSetup === undefined) s.allianceSetup = false;
  if (s.isAdmin === undefined) s.isAdmin = false;
